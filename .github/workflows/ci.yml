name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint / Build / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Chromium is only needed at PDF-export runtime, not for the
        # unit/integration suite — skip the heavy download in CI.
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (with coverage gate)
        run: npm run test:coverage
